services:
  # GR31 Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: be-gr31:latest
    container_name: be-gr31-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      REDIS_ADDR: redis:6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gr31-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Redis
  redis:
    image: redis:7.4-alpine
    container_name: be-gr31-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - gr31-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# Named volumes
volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local

# Network
networks:
  gr31-net:
    driver: bridge
